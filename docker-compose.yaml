# References:
# 1. https://github.com/docker/awesome-compose/tree/master/frontnet-postgres

###
# Run: docker compose up --build

##### NOTE ###########################################
#### THIS DOCKER COMPOSE IS FOR LOCAL DEVELOPMENT ####
######################################################
services:
  kvd_reverse_proxy_service:
    image: kvd_reverse_proxy_img
    build:
      context: ./reverse_proxy
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "8787:8888"
    stdin_open: true
    # restart: always
    networks:
      - frontnet
      - backnet
    depends_on:
      - kvd_Frontend_service
      - kvd_Backend_service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kvd_Frontend_service:
    env_file:
      - ./frontend/.env
    image: kvd_ecotel_frontend_img
    build:
      context: ./frontend
    # target: development
    stdin_open: true
    volumes:
      # For development only, to synced src code to container
      # - ./ecotel_frontend:/usr/src/app
      - /usr/src/app/node_modules
    # restart: always
    networks:
      - frontnet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  # ports:
  #   - "3000:80"
  # depends_on:
  #   - ecotel_backend_service

  kvd_Backend_service:
    env_file:
      - ./backend/.env
    image: kvd_ecotel_backend_img
    build:
      context: ./backend
    # target: development
    stdin_open: true
    volumes:
      # For development only, to synced src code to container
      # - ./Backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - kvd_db
    # ports:
    #   - "8080:8080"
    # restart: always
    networks:
      - backnet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kvd_db:
    image: mongo
    container_name: kvd_mongo_db
    #restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - .mongodb-data:/data/db
    networks:
      - backnet
    ports:
      - "27019:27017"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

